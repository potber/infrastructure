apiVersion: apps/v1
kind: Deployment
metadata:
  name: imgpot
  labels:
    app.kubernetes.io/name: imgpot
    app.kubernetes.io/component: media
    app.kubernetes.io/part-of: potber
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: imgpot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: imgpot
        app.kubernetes.io/component: media
        app.kubernetes.io/part-of: potber
    spec:
      containers:
        - name: imgpot
          image: ghcr.io/potber/imgpot:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: imgpot-config
            - secretRef:
                name: imgpot-secret
          startupProbe:
            httpGet:
              path: /up
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /up
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /up
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: imgpot
  labels:
    app.kubernetes.io/name: imgpot
    app.kubernetes.io/component: media
    app.kubernetes.io/part-of: potber
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: imgpot
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: imgpot
  labels:
    app.kubernetes.io/name: imgpot
    app.kubernetes.io/component: media
    app.kubernetes.io/part-of: potber
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  ingressClassName: nginx
  rules:
    - host: imgpot.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: imgpot
                port:
                  number: 80
  tls:
    - hosts:
        - imgpot.example.invalid
      secretName: imgpot.example.invalid-tls

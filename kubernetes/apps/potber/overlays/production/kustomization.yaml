apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: potber-prod
resources:
  - ../../base
configMapGenerator:
  - name: potber-api-config
    envs:
      - potber-api.env
  - name: potber-auth-config
    envs:
      - potber-auth.env
  - name: potber-client-config
    files:
      - injected-config.js=potber-client-config.js
secretGenerator:
  - name: potber-api-secret
    envs:
      - potber-api.secret.env
images:
  - name: ghcr.io/potber/potber-api
    newTag: 3.4.0 # {"$imagepolicy": "flux-system:potber-api-prod:tag"}
  - name: ghcr.io/potber/potber-auth
    newTag: 1.7.0 # {"$imagepolicy": "flux-system:potber-auth-prod:tag"}
  - name: ghcr.io/potber/potber-client
    newTag: 1.28.1 # {"$imagepolicy": "flux-system:potber-client-prod:tag"}
replicas:
  - name: potber-api
    count: 1
  - name: potber-auth
    count: 1
  - name: potber-client
    count: 1
patches:
  - path: patch-potber-api-ingress.yaml
  - path: patch-potber-auth-ingress.yaml
  - path: patch-potber-client-ingress.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: potber-api
spec:
  rules:
    - host: test-api.potber.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: potber-api
                port:
                  number: 80
  tls:
    - hosts:
        - test-api.potber.de
      secretName: test-api.potber.de-tls

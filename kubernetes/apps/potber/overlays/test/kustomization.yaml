apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: potber-test
resources:
  - ../../base
configMapGenerator:
  - name: potber-api-config
    envs:
      - potber-api.env
  - name: potber-auth-config
    envs:
      - potber-auth.env
  - name: potber-client-config
    files:
      - injected-config.js=potber-client-config.js
secretGenerator:
  - name: potber-api-secret
    envs:
      - potber-api.secret.env
images:
  - name: ghcr.io/potber/potber-api
    newTag: main-20260315-212259-6cbc1d6a3d2bae298a0c14e15d809ebfe011fc8e # {"$imagepolicy": "flux-system:potber-api-test:tag"}
  - name: ghcr.io/potber/potber-auth
    newTag: main-20260309-105305-bb2557fcc5ceefa8c9d8e88f4c558b0eedd00dbe # {"$imagepolicy": "flux-system:potber-auth-test:tag"}
  - name: ghcr.io/potber/potber-client
    newTag: main-20260329-210128-64ff5517c94e6d5abe936ce7dbe0e999eda4b6da # {"$imagepolicy": "flux-system:potber-client-test:tag"}
replicas:
  - name: potber-api
    count: 1
  - name: potber-auth
    count: 1
  - name: potber-client
    count: 1
patches:
  - path: patch-potber-api-ingress.yaml
  - path: patch-potber-auth-ingress.yaml
  - path: patch-potber-client-ingress.yaml

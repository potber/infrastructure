apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: potber
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 10m0s
  retryInterval: 1m0s
  timeout: 10m0s
  prune: true
  wait: true
  path: ./kubernetes/potber
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age

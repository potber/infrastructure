apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  retryInterval: 1m0s
  timeout: 5m0s
  prune: true
  wait: true
  path: ./kubernetes/infrastructure/production
  sourceRef:
    kind: GitRepository
    name: flux-system

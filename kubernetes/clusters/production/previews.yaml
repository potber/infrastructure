apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: previews
  namespace: flux-system
spec:
  suspend: true
  interval: 1m0s
  retryInterval: 1m0s
  timeout: 10m0s
  prune: true
  wait: true
  path: ./kubernetes/previews
  sourceRef:
    kind: GitRepository
    name: flux-system
